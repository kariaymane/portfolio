<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #c8ff3d;
  --white: #ffffff;
  --glass-bg: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.10);
  --glass-shadow: 0 32px 80px rgba(0,0,0,0.6);
  --blur: blur(30px);
  --font-mono: 'JetBrains Mono', monospace;
  --font-sans: 'Inter', sans-serif;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: var(--font-sans);
  color: var(--white);
}

#video-stage {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: #000;
  opacity: 1;
  transition: opacity 0.8s ease;
}
#video-stage.fade-out { opacity: 0; pointer-events: none; }

#intro-video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

#scene {
  position: fixed;
  inset: 0;
  opacity: 0;
  transition: opacity 0.6s ease;
  overflow: hidden;
}
#scene.visible { opacity: 1; }

#bg-canvas {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% -10%, #1a1a2e 0%, #0a0a0f 60%, #000 100%);
  z-index: 0;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0;
  animation: orbFloat 12s ease-in-out infinite;
}
.orb-1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(200,255,61,0.06) 0%, transparent 70%);
  top: -150px; left: -100px;
  animation-delay: 0s;
}
.orb-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(100,120,255,0.08) 0%, transparent 70%);
  top: 20%; right: -100px;
  animation-delay: 3s;
}
.orb-3 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
  bottom: -200px; left: 30%;
  animation-delay: 6s;
}
@keyframes orbFloat {
  0%,100% { transform: translateY(0px) scale(1); }
  50%      { transform: translateY(-40px) scale(1.05); }
}

#particle-canvas {
  position: absolute;
  inset: 0;
  z-index: 1;
}

#main-panel {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.88);
  z-index: 10;
  width: min(820px, 92vw);
  min-height: min(520px, 80vh);
  background: var(--glass-bg);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.08);
  padding: 56px 60px 48px;
  opacity: 0;
  filter: blur(16px);
  transition:
    opacity   0.7s cubic-bezier(.22,1,.36,1),
    transform 0.7s cubic-bezier(.22,1,.36,1),
    filter    0.7s cubic-bezier(.22,1,.36,1);
}
#main-panel.revealed {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  filter: blur(0);
}

#hello-line {
  font-family: var(--font-mono);
  font-size: clamp(36px, 6vw, 80px);
  font-weight: 700;
  color: var(--white);
  letter-spacing: -1px;
  line-height: 1.1;
  min-height: 1.2em;
  opacity: 0;
}
#hello-line.visible { opacity: 1; }

#name-line {
  font-family: var(--font-sans);
  font-size: clamp(22px, 3.5vw, 44px);
  font-weight: 200;
  color: rgba(255,255,255,0.85);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-top: 14px;
  min-height: 1.4em;
  opacity: 0;
}
#name-line.visible { opacity: 1; }

.cursor {
  display: inline-block;
  width: 3px;
  height: 1em;
  background: var(--accent);
  margin-left: 2px;
  vertical-align: middle;
  animation: blink 1s step-end infinite;
  border-radius: 1px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

#divider {
  width: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--accent) 0%, rgba(200,255,61,0.3) 60%, transparent 100%);
  margin: 32px 0;
  transition: width 0.8s cubic-bezier(.22,1,.36,1);
}
#divider.expanded { width: 100%; }

#panels-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.side-panel {
  flex: 1;
  min-width: 200px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 28px 26px;
  opacity: 0;
  transform: translateX(-60px);
  transition:
    opacity   0.6s cubic-bezier(.22,1,.36,1),
    transform 0.6s cubic-bezier(.22,1,.36,1);
}
.side-panel.slide-right-start { transform: translateX(60px); }
.side-panel.revealed {
  opacity: 1;
  transform: translateX(0);
}

.panel-title {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 18px;
}
.panel-section {
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
  margin-top: 16px;
}
.panel-item {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 300;
  color: rgba(255,255,255,0.85);
  padding: 5px 0;
  opacity: 0;
  transform: translateX(-12px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-item::before {
  content: '';
  width: 4px; height: 4px;
  background: var(--accent);
  border-radius: 50%;
  flex-shrink: 0;
  opacity: 0.7;
}
.panel-item.visible {
  opacity: 1;
  transform: translateX(0);
}

#social-bar {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  gap: 4px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 60px;
  padding: 10px 18px;
  opacity: 0;
  transition: opacity 0.5s ease;
}
#social-bar.visible { opacity: 1; }

.social-icon {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  opacity: 0;
  transition: color 0.3s, background 0.3s, transform 0.3s, box-shadow 0.3s;
  text-decoration: none;
}
.social-icon.visible { opacity: 1; }
.social-icon:hover {
  color: var(--accent);
  background: rgba(200,255,61,0.08);
  transform: translateY(-4px) scale(1.15);
  box-shadow: 0 0 18px rgba(200,255,61,0.25);
}
.social-icon svg { width: 18px; height: 18px; fill: currentColor; }

#enter-btn {
  display: block;
  margin: 40px auto 0;
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--white);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 50px;
  padding: 14px 40px;
  cursor: pointer;
  opacity: 0;
  transform: translateY(12px);
  transition:
    opacity      0.5s ease,
    transform    0.5s ease,
    background   0.3s,
    box-shadow   0.3s,
    border-color 0.3s;
  position: relative;
  overflow: hidden;
}
#enter-btn.visible {
  opacity: 1;
  transform: translateY(0);
}
#enter-btn:hover {
  background: rgba(200,255,61,0.07);
  border-color: rgba(200,255,61,0.5);
  box-shadow: 0 0 30px rgba(200,255,61,0.15);
  transform: scale(1.04);
}
#enter-btn .ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(200,255,61,0.25);
  transform: scale(0);
  animation: ripple 0.6s linear;
  pointer-events: none;
}
@keyframes ripple { to { transform: scale(4); opacity: 0; } }

@media (max-width: 640px) {

  #panels-row { flex-direction: column; }
  .side-panel { min-width: unset; }
  #social-bar { padding: 8px 12px; }
}
</style>

<script>
(function initParticles() {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  const COUNT = 70;
  let particles = [];
  let animating = false;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class Particle {
    constructor() { this.reset(true); }
    reset(rand) {
      this.x = Math.random() * canvas.width;
      this.y = rand ? Math.random() * canvas.height : canvas.height + 10;
      this.size = Math.random() * 1.5 + 0.3;
      this.speedY = -(Math.random() * 0.4 + 0.1);
      this.speedX = (Math.random() - 0.5) * 0.2;
      this.opacity = Math.random() * 0.5 + 0.1;
      this.life = 0;
      this.maxLife = Math.random() * 300 + 200;
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      this.life++;
      if (this.life > this.maxLife || this.y < -10) this.reset(false);
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.opacity * Math.sin((this.life / this.maxLife) * Math.PI);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  for (let i = 0; i < COUNT; i++) particles.push(new Particle());

  function loop() {
    if (!animating) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }

  window.startParticles = function () {
    animating = true;
    loop();
  };
})();

const delay = ms => new Promise(r => setTimeout(r, ms));

async function typewriter(el, text, speed = 55) {
  return new Promise(resolve => {
    let i = 0;
    el.innerHTML = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.appendChild(cursor);
    function type() {
      if (i < text.length) {
        el.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
        setTimeout(type, speed + Math.random() * 30);
      } else {
        resolve(cursor);
      }
    }
    type();
  });
}

async function staggerItems(selector, groupDelay = 90) {
  const items = document.querySelectorAll(selector);
  for (const item of items) {
    item.classList.add('visible');
    await delay(groupDelay);
  }
}

document.getElementById('enter-btn').addEventListener('click', function (e) {
  const btn = this;
  const r = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size / 2}px;top:${e.clientY - rect.top - size / 2}px`;
  btn.appendChild(r);
  setTimeout(() => r.remove(), 700);
});

async function runSequence() {
  window.startParticles();

  document.querySelectorAll('.orb').forEach(o => {
    o.style.transition = 'opacity 2s ease';
    o.style.opacity = '1';
  });

  await delay(300);
  document.getElementById('main-panel').classList.add('revealed');
  await delay(800);

  const helloEl = document.getElementById('hello-line');
  helloEl.classList.add('visible');
  const helloCursor = await typewriter(helloEl, 'HELLO DEV 106', 70);
  await delay(700);

  helloCursor.remove();
  const nameEl = document.getElementById('name-line');
  nameEl.classList.add('visible');
  const nameCursor = await typewriter(nameEl, 'Aymane Kari', 80);
  await delay(600);
  nameCursor.remove();

  document.getElementById('divider').classList.add('expanded');
  await delay(700);

  document.getElementById('portfolio-panel').classList.add('revealed');
  await delay(200);
  await staggerItems('#portfolio-panel .panel-item', 100);
  await delay(200);

  document.getElementById('ai-panel').classList.add('revealed');
  await delay(200);
  await staggerItems('#ai-panel .panel-item', 100);
  await delay(300);

  const socialBar = document.getElementById('social-bar');
  socialBar.classList.add('visible');
  for (const icon of socialBar.querySelectorAll('.social-icon')) {
    icon.classList.add('visible');
    await delay(150);
  }
  await delay(400);

  document.getElementById('enter-btn').classList.add('visible');
}

const video = document.getElementById('intro-video');
const videoStage = document.getElementById('video-stage');
const scene = document.getElementById('scene');

function onVideoEnd() {
  videoStage.classList.add('fade-out');
  scene.classList.add('visible');
  setTimeout(() => {
    videoStage.style.display = 'none';
    runSequence();
  }, 850);
}

video.addEventListener('ended', onVideoEnd);
video.addEventListener('error', () => setTimeout(onVideoEnd, 500));
video.addEventListener('stalled', () => {
  setTimeout(() => {
    if (video.readyState < 2) onVideoEnd();
  }, 3000);
});
</script>
